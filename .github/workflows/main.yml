name: Solana Bot

on:
  schedule:
    - cron: '*/5 * * * *' # هادي هي اللي كتقول ليه يخدم كل 5 دقايق
  workflow_dispatch:      # هادي هي اللي كتزيد زر "Run workflow" يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests solders base58 solana
      - name: Run Bot
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: python main.py
